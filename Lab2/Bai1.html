<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>
    <div class="container my-5">
        <table class="table table-bordered text-center mt-3">
            <h2 class="text-center text-danger">Bảng Thành Phần Dinh Dưỡng</h2>
            <thead>
                <tr>
                    <th rowspan="2" valign="middle" class="bg-warning">Thành phần</th>
                    <th colspan="2" valign="middle" class="bg-warning">Giá trị</th>

                <tr>
                    <th class="bg-warning">Khối lượng</th>
                    <th class="bg-warning">% DV*</th>
                </tr>
                </tr>

                <tr>
                    <td>Calories</td>
                    <td>200 kcal</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Chất béo</td>
                    <td>9g</td>
                    <td>14%</td>
                </tr>
                <tr>
                    <td>Chất béo bão hòa</td>
                    <td>4g</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Chất đạm</td>
                    <td>8g</td>
                    <td>16%</td>
                </tr>
                <tr>
                    <td>Chất xơ</td>
                    <td>5g</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Đường</td>
                    <td>12g</td>
                    <td>-</td>
                </tr>
                <tr>
                    <td rowspan="2" valign="middle" class="text-danger bg-danger">Vitamin</td>
                    <td>Vitamin C</td>
                    <td>25%</td>
                </tr>
                <tr>
                    <td>Vitamin D</td>
                    <td>10%</td>
                </tr>
            </thead>
        </table>
    </div>
</body>

</html>
